<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>MHH Tech Solutions – Testseite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e3a5f);
      color: #e2e8f0;
      padding: 2rem;
    }
    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    h1 { font-size: 1.6rem; margin-bottom: 0.75rem; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
    .status {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .status.ok { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.4); }
    .status.warn { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.4); }
    footer { margin-top: 2rem; font-size: 0.8rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MHH Tech Solutions</h1>
    <p>Diese Seite dient als Platzhalter zum Testen der Server- und SSL-Konfiguration. Die eigentliche Website folgt in Kürze.</p>
    <span id="ssl-status" class="status warn">Verbindung wird geprüft …</span>
    <footer>Testseite · Website für Fabian Rupp</footer>
  </div>
  <script>
    var el = document.getElementById('ssl-status');
    if (location.protocol === 'https:') {
      el.textContent = '🔒 HTTPS aktiv – SSL funktioniert';
      el.className = 'status ok';
    } else {
      el.textContent = '⚠️ Keine HTTPS-Verbindung (HTTP)';
      el.className = 'status warn';
    }
  </script>
</body>
</html>
